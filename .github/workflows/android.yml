name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create Env File
        run: |
          echo "VITE_SUPABASE_URL=https://ncoaeyhnvpjlvmakzpft.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jb2FleWhudnBqbHZtYWt6cGZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTc5OTAsImV4cCI6MjA4Nzg5Mzk5MH0.jZowyEBIDQkj3BLfEUrQoFpsBAoMgxkDCZgvJzcCXq0" >> .env

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-food-app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
